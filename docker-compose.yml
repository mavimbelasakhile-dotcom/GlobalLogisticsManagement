version: '3.8'

services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      SA_PASSWORD: "Str0ngP@ssw0rd!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Str0ngP@ssw0rd!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  glms-backend-api:
    build:
      context: ./GlobalLogisticsManagementSystemAPI
      dockerfile: Dockerfile
    container_name: glms-backend-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sql-server-db,1433;Database=GlobalLogisticsManagement;User ID=sa;Password=Str0ngP@ssw0rd!;Encrypt=True;TrustServerCertificate=True;Connection Timeout=30;
      - Jwt__Key=YourSuperSecretKeyThatIsAtLeast32Characters!
      - Jwt__Issuer=GlobalLogisticsManagementAPI
      - Jwt__Audience=GlobalLogisticsMVCClient
    ports:
      - "5110:8080"
    depends_on:
      sql-server-db:
        condition: service_healthy
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: ./GlobalLogisticsManagementSystemMVC
      dockerfile: Dockerfile
    container_name: glms-frontend-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiSettings__BaseUrl=http://glms-backend-api:8080
    ports:
      - "5200:8080"
    depends_on:
      - glms-backend-api
    networks:
      - glms-network

volumes:
  sqldata:

networks:
  glms-network:
    driver: bridge
